<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mine Admin</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header">
        <div>
            <h1>Mine Admin</h1>
            <p>Manage your project</p>
        </div>
    </header>

    <div id="layout">

        <aside id="sidebar">
            <button data-page="dashboard">🏠 Dashboard</button>
            <button data-page="models">📦 Models</button>
            <button data-page="database">🗃 Database</button>
            <button data-page="users">👥 Users</button>
            <button data-page="settings">⚙ Settings</button>
        </aside>

        <main id="content">

            <section id="page">
                <h2>Welcome to Mine Admin</h2>

                <p>
                    Select a page from the sidebar.
                </p>
            </section>

        </main>

    </div>

    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>

</body>
</html>
